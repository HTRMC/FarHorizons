name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(cat .zigversion)" >> $GITHUB_ENV

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install X11 dev libraries
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: Build (x86_64-linux)
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build (aarch64-linux)
        run: zig build -Dtarget=aarch64-linux-gnu
